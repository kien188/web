<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng Nhập - Computer Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    body {
      background: var(--primary-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .auth-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }
    .auth-header { text-align: center; margin-bottom: 30px; }
    .auth-header i { font-size: 3rem; color: #764ba2; }
    .form-control { border-radius: 10px; padding: 12px; }
    .btn-auth {
      background: var(--primary-gradient);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: bold;
      color: white;
    }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="auth-header">
    <i class="bi bi-shield-lock-fill"></i>
    <h2 class="fw-bold mt-2">Chào Mừng</h2>
    <p class="text-muted">Đăng nhập để tiếp tục mua sắm</p>
  </div>

  <form id="loginForm">
    <div class="mb-3">
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
        <input type="text" class="form-control border-start-0" id="loginUsername" placeholder="Tên đăng nhập" required>
      </div>
    </div>
    <div class="mb-3">
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0"><i class="bi bi-key"></i></span>
        <input type="password" class="form-control border-start-0" id="loginPassword" placeholder="Mật khẩu" required>
      </div>
    </div>
    <div id="loginError" class="alert alert-danger d-none small"></div>
    <button type="submit" class="btn btn-auth w-100 mb-3">ĐĂNG NHẬP</button>
  </form>

  <div class="text-center">
    <p class="small">Chưa có tài khoản? <a href="register.html" class="text-decoration-none fw-bold text-success">Đăng ký ngay</a></p>
    <a href="index.html" class="text-muted small"><i class="bi bi-house"></i> Về trang chủ</a>
  </div>
</div>

<script>
  document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const users = JSON.parse(localStorage.getItem("users") || "[]");
    const user = users.find(u => u.username === document.getElementById("loginUsername").value.trim());
    const pass = document.getElementById("loginPassword").value;
    const errorDiv = document.getElementById("loginError");

    if (user && user.password === pass) {
      localStorage.setItem("currentUser", user.username);
      window.location.href = "index.html";
    } else {
      errorDiv.innerText = "Sai tên đăng nhập hoặc mật khẩu!";
      errorDiv.classList.remove("d-none");
    }
  });
</script>
</body>
</html>
