<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng Ký - Computer Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    body {
      background: var(--primary-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .auth-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .auth-header i {
      font-size: 3rem;
      color: #667eea;
    }
    .form-control {
      border-radius: 10px;
      padding: 12px;
      border: 1px solid #ddd;
    }
    .btn-auth {
      background: var(--primary-gradient);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: bold;
      color: white;
      transition: transform 0.2s;
    }
    .btn-auth:hover {
      transform: translateY(-2px);
      color: white;
    }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="auth-header">
    <i class="bi bi-person-plus-fill"></i>
    <h2 class="fw-bold mt-2">Tạo Tài Khoản</h2>
    <p class="text-muted">Gia nhập cộng đồng Computer Store</p>
  </div>

  <form id="registerForm">
    <div class="mb-3">
      <label class="form-label small fw-bold">Tên đăng nhập</label>
      <input type="text" class="form-control" id="regUsername" placeholder="Ví dụ: nva_2025" required>
    </div>
    <div class="mb-3">
      <label class="form-label small fw-bold">Email</label>
      <input type="email" class="form-control" id="regEmail" placeholder="name@example.com" required>
    </div>
    <div class="mb-3">
      <label class="form-label small fw-bold">Mật khẩu</label>
      <input type="password" class="form-control" id="regPassword" placeholder="Tối thiểu 6 ký tự" required>
    </div>
    <div class="mb-3">
      <label class="form-label small fw-bold">Xác nhận mật khẩu</label>
      <input type="password" class="form-control" id="regConfirmPassword" placeholder="Nhập lại mật khẩu" required>
    </div>
    <div id="registerError" class="alert alert-danger d-none small"></div>
    <button type="submit" class="btn btn-auth w-100 mb-3">ĐĂNG KÝ NGAY</button>
  </form>

  <div class="text-center">
    <p class="small">Đã có tài khoản? <a href="login.html" class="text-decoration-none fw-bold">Đăng nhập</a></p>
    <a href="index.html" class="text-muted small"><i class="bi bi-arrow-left"></i> Quay lại trang chủ</a>
  </div>
</div>

<script>
  const users = JSON.parse(localStorage.getItem("users") || "[]");

  document.getElementById("registerForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const username = document.getElementById("regUsername").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    const confirm = document.getElementById("regConfirmPassword").value;
    const errorDiv = document.getElementById("registerError");

    errorDiv.classList.add("d-none");

    if (password.length < 6) {
      errorDiv.innerText = "Mật khẩu phải từ 6 ký tự!";
      errorDiv.classList.remove("d-none");
      return;
    }
    if (password !== confirm) {
      errorDiv.innerText = "Mật khẩu xác nhận không khớp!";
      errorDiv.classList.remove("d-none");
      return;
    }
    if (users.some(u => u.username === username)) {
      errorDiv.innerText = "Tên đăng nhập đã tồn tại!";
      errorDiv.classList.remove("d-none");
      return;
    }

    users.push({ username, email, password, createdAt: new Date().toISOString() });
    localStorage.setItem("users", JSON.stringify(users));
    alert("Đăng ký thành công!");
    window.location.href = "login.html";
  });
</script>
</body>
</html>
